<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دەستپێک - ISLAM</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #141414;
            --accent-green: #ffffff;
            --text-white: #ffffff;
            --text-gray: #a3b8b0;
            --border-color: #262626;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-white);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: var(--bg-color);
            padding: 20px;
            box-sizing: border-box;
            border-radius: 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            border: 2px solid var(--border-color);
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            padding: 0 10px 15px 10px;
            font-weight: bold;
        }
        .logo-box {
            background-color: var(--card-bg);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }
        .mosque-icon {
            width: 140px;
            height: 95px;
            margin-bottom: 10px;
        }
        .brand-title {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #ffffff;
        }
        .line {
            width: 40px;
            height: 2px;
            background-color: #ffffff;
            margin: 6px auto 0 auto;
            border-radius: 2px;
        }
        .location-box {
            background-color: var(--card-bg);
            padding: 12px 18px;
            border-radius: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }
        .location-select {
            background: transparent;
            color: var(--text-white);
            border: none;
            font-size: 14px;
            font-weight: bold;
            outline: none;
            cursor: pointer;
            width: 180px;
        }
        .location-select option {
            background-color: var(--card-bg);
            color: var(--text-white);
        }
        .prayer-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .prayer-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 12px 5px;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .prayer-card.active {
            border: 2px solid #ffffff;
        }
        .prayer-name {
            font-size: 13px;
            color: var(--text-gray);
            margin-bottom: 5px;
        }
        .prayer-time {
            font-size: 14px;
            font-weight: bold;
        }
        .nav-bar {
            display: flex;
            justify-content: space-around;
            background-color: var(--card-bg);
            padding: 12px;
            border-radius: 25px;
            border: 1px solid var(--border-color);
        }
        .nav-item {
            color: var(--text-gray);
            font-size: 18px;
            cursor: pointer;
        }
        .nav-item.active {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- سەری موبایلێ -->
        <div class="status-bar">
            <span>3:21</span>
            <span style="color: #ffffff; font-size: 12px;">KOREK 📶</span>
        </div>

        <!-- لۆگۆیا مزگەفتێ و ناڤێ ISLAM -->
        <div class="logo-box">
            <svg class="mosque-icon" viewBox="0 0 500 350" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- هیلالا سەر گۆنبەدێ -->
                <path d="M260 60C274 60 285 71 282 82C276 75 268 75 260 81C252 75 244 75 238 82C235 71 246 60 260 60Z" fill="white"/>
                <!-- مینارە -->
                <path d="M135 90H165V240H135V90Z" fill="white"/>
                <path d="M335 90H365V240H335V90Z" fill="white"/>
                <path d="M130 80H170V95H130V80Z" fill="white"/>
                <path d="M330 80H370V95H330V80Z" fill="white"/>
                <!-- گۆنبەدا مەزن -->
                <path d="M250 130C295 130 320 165 320 205H180C180 165 205 130 250 130Z" fill="white"/>
                <!-- گۆنبەدێن بچووک و بنەما -->
                <path d="M185 175H225V240H185V175Z" fill="white"/>
                <path d="M275 175H315V240H275V175Z" fill="white"/>
                <path d="M100 215H400V245H100V215Z" fill="white"/>
                <path d="M90 240H410V260H90V240Z" fill="white"/>
            </svg>
            <h1 class="brand-title">ISLAM</h1>
            <div class="line"></div>
        </div>

        <!-- هەلبژارتنا جهـ -->
        <div class="location-box">
            <div>
                <div style="font-size: 11px; color: var(--text-gray);">دەڤەرا خۆ هەلبژێرە</div>
                <select class="location-select">
                    <optgroup label="دەڤەرا بادینان">
                        <option value="duhok">دهۆک</option>
                        <option value="zakho">زاخۆ</option>
                        <option value="akre">ئاکرێ</option>
                        <option value="amedi">ئامێدی</option>
                        <option value="semel">سێمێل</option>
                        <option value="bardarash">بەردەڕەش</option>
                        <option value="shekhan">شێخان</option>
                    </optgroup>
                    <optgroup label="دەڤەرا هەولێرێ">
                        <option value="erbil">هەولێر (پایتەخت)</option>
                        <option value="shaqlawa">شەقلاوە</option>
                        <option value="soran">سۆران</option>
                        <option value="rawanduz">ڕەواندز</option>
                        <option value="choman">چۆمان</option>
                        <option value="mergasor">مێرگەسۆر</option>
                        <option value="koya">کۆیە</option>
                        <option value="makhmur">مەخمور</option>
                    </optgroup>
                    <optgroup label="دەڤەرا سۆران و راپەڕین">
                        <option value="raniyah">ڕانیە</option>
                        <option value="qaladiza">قەڵادزێ</option>
                        <option value="piskand">پشدەر</option>
                    </optgroup>
                    <optgroup label="دەڤەرا سلێمانی و دەوروبەر">
                        <option value="sulaymaniyah">سلێمانی</option>
                        <option value="dukan">دووکان</option>
                        <option value="darbandikhan">دەربەندیخان</option>
                        <option value="Kalar">کەلار</option>
                        <option value="Chamchamal">چەمچەماڵ</option>
                        <option value="penjwen">پێنجوێن</option>
                        <option value="halabja">هەڵەبجە</option>
                    </optgroup>
                    <optgroup label="کەرکووک و گەرمیان">
                        <option value="kirkuk">کەرکووک</option>
                        <option value="tuzkurmatu">توزخورماتوو</option>
                        <option value="khanaqin">خانەقین</option>
                    </optgroup>
                </select>
            </div>
            <div style="font-size: 12px; color: var(--text-gray);">9 صفر 1448</div>
        </div>

        <!-- دەمێن بانگان -->
        <div class="prayer-grid">
            <div class="prayer-card active">
                <div class="prayer-name">سێپێدە</div>
                <div class="prayer-time">3:29 AM</div>
            </div>
            <div class="prayer-card">
                <div class="prayer-name">رۆژ هەلات</div>
                <div class="prayer-time">5:14 AM</div>
            </div>
            <div class="prayer-card">
                <div class="prayer-name">نێڤرۆ</div>
                <div class="prayer-time">12:22 PM</div>
            </div>
            <div class="prayer-card">
                <div class="prayer-name">عەسر</div>
                <div class="prayer-time">4:09 PM</div>
            </div>
            <div class="prayer-card">
                <div class="prayer-name">مەغریب</div>
                <div class="prayer-time">7:27 PM</div>
            </div>
            <div class="prayer-card">
                <div class="prayer-name">عەیشا</div>
                <div class="prayer-time">8:53 PM</div>
            </div>
        </div>

        <!-- ناڤیگاسیۆنا خوارێ -->
        <div class="nav-bar">
            <div class="nav-item">⚙️</div>
            <div class="nav-item">❤️</div>
            <div class="nav-item">🕒</div>
            <div class="nav-item">📖</div>
            <div class="nav-item active">🏠</div>
        </div>
    </div>

</body>
</html>
